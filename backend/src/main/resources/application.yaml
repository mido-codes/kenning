spring:
  application:
    name: kenning
  docker:
    compose:
      enabled: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kenning}
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:app}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        model: nomic-embed-text
      chat:
        model: llama3.2:3b

server:
  port: 8080